name: Build & Publish Docker Image

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main          # publish latest on every merge to main
    tags:
      - "v*.*.*"      # publish a versioned tag when you push e.g. v1.2.0
  pull_request:
    branches:
      - main          # build-only (no push) on PRs to catch broken Dockerfiles early
  workflow_dispatch:  # allow one-click manual runs from the Actions tab

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

# ── Global env ────────────────────────────────────────────────────────────────
env:
  REGISTRY: ghcr.io
  # github.repository is "owner/repo", e.g. "gregorynardiello/manga-tracker"
  # The metadata action lowercases it automatically (required by OCI spec).
  IMAGE_NAME: ${{ github.repository }}

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Build (and push on main / tags) ──────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      # 1a. Check out the full repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1b. QEMU lets Buildx cross-compile linux/arm64 on the x86 runner.
      #     Unraid runs on x86, but arm64 is useful if you ever run this on
      #     a Raspberry Pi or Apple Silicon device.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 1c. Buildx is the multi-platform build driver
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1d. Log in to GHCR — only on pushes (not PRs, which can't use secrets safely)
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # auto-generated, no setup needed

      # 1e. Derive image tags and OCI labels from git context:
      #
      #   Push to main  →  ghcr.io/owner/manga-tracker:latest
      #                     ghcr.io/owner/manga-tracker:main
      #                     ghcr.io/owner/manga-tracker:sha-abc1234
      #
      #   Push tag v1.2.3 →  ghcr.io/owner/manga-tracker:1.2.3
      #                       ghcr.io/owner/manga-tracker:1.2
      #                       ghcr.io/owner/manga-tracker:1
      #                       ghcr.io/owner/manga-tracker:latest
      #
      #   Pull request  →  build only, no tags pushed
      #
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # latest on default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # branch name (e.g. "main")
            type=ref,event=branch
            # short SHA for traceability  (e.g. sha-abc1234)
            type=sha,prefix=sha-,format=short
            # semver from git tag (v1.2.3 → 1, 1.2, 1.2.3)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
          # OCI labels that show up in GHCR's "About" panel
          labels: |
            org.opencontainers.image.title=Manga Tracker
            org.opencontainers.image.description=Self-hosted manga chapter tracking dashboard with MangaBaka + MangaUpdates integration and Pushover notifications
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      # 1f. Build (and push when not a PR)
      #     GHA cache makes repeat builds ~3-5x faster.
      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Build for both x86 (Unraid) and arm64 (Pi, Apple Silicon, etc.)
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache stored in GitHub Actions cache — persists across runs
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false   # keeps the manifest list clean for Unraid's docker pull

      # 1g. Print the digest so it's easy to pin a specific build in the template
      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "### 🐳 Published Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`ghcr.io/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | sed 's/^/- `/' | sed 's/$/`/' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build-push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull with: \`docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
